<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Screen & Audio Logger</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        width: 340px;
        background: #1a1a1a;
        color: #e0e0e0;
      }
      h3 { margin: 0 0 10px; font-size: 14px; color: #fff; }
      .controls { display: flex; gap: 8px; margin-bottom: 10px; }
      button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }
      #start { background: #2e7d32; color: #fff; }
      #start:disabled { background: #444; color: #888; cursor: default; }
      #stop  { background: #c62828; color: #fff; }
      #stop:disabled  { background: #444; color: #888; cursor: default; }

      #preview-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      #screen-preview {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #preview-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-size: 12px;
      }

      .meters { display: flex; gap: 6px; margin-bottom: 8px; }
      .meter-box {
        flex: 1;
        background: #2a2a2a;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 11px;
      }
      .meter-label { color: #888; margin-bottom: 4px; }
      .meter-bar-track {
        height: 4px;
        background: #444;
        border-radius: 2px;
        overflow: hidden;
      }
      .meter-bar {
        height: 100%;
        width: 0%;
        background: #4caf50;
        border-radius: 2px;
        transition: width 0.1s;
      }

      #log {
        background: #111;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 10px;
        font-family: monospace;
        height: 80px;
        overflow-y: auto;
        color: #7ec8a0;
      }
      .log-screen { color: #64b5f6; }
      .log-audio  { color: #7ec8a0; }
      .log-error  { color: #ef9a9a; }
    </style>
  </head>
  <body>
    <h3>Screen &amp; Audio Logger</h3>

    <div id="preview-wrap">
      <video id="screen-preview" autoplay muted playsinline></video>
      <div id="preview-placeholder">No screen capture active</div>
    </div>

    <div class="meters">
      <div class="meter-box" id="meter-tab">
        <div class="meter-label">Tab audio</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-tab"></div></div>
      </div>
      <div class="meter-box" id="meter-mic">
        <div class="meter-label">Microphone</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-mic"></div></div>
      </div>
      <div class="meter-box" id="meter-sys">
        <div class="meter-label">System audio</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-sys"></div></div>
      </div>
    </div>

    <div class="controls">
      <button id="start">&#9654; Start</button>
      <button id="stop" disabled>&#9632; Stop</button>
    </div>

    <div id="log"></div>

    <script src="popup.js"></script>
  </body>
</html>
