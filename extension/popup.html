<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Obli</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        width: 340px;
        background: #1a1a1a;
        color: #e0e0e0;
      }
      h3 { margin: 0 0 10px; font-size: 14px; color: #fff; }
      .controls { display: flex; gap: 8px; margin-bottom: 10px; }
      button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }
      #start { background: #2e7d32; color: #fff; }
      #start:disabled { background: #444; color: #888; cursor: default; }
      #stop  { background: #c62828; color: #fff; }
      #stop:disabled  { background: #444; color: #888; cursor: default; }
      #popout {
        width: 100%;
        padding: 7px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        margin-bottom: 8px;
        background: #222;
        color: #ddd;
        cursor: pointer;
        font-size: 12px;
      }
      #popout:disabled { color: #777; cursor: default; }
      #overlay-toggle {
        width: 100%;
        padding: 7px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        margin-bottom: 8px;
        background: #2b2b2b;
        color: #ddd;
        cursor: pointer;
        font-size: 12px;
      }

      #preview-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      #screen-preview {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #preview-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-size: 12px;
      }

      .meters { display: flex; gap: 6px; margin-bottom: 8px; }
      .meter-box {
        flex: 1;
        background: #2a2a2a;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 11px;
      }
      .meter-label { color: #888; margin-bottom: 4px; }
      .meter-bar-track {
        height: 4px;
        background: #444;
        border-radius: 2px;
        overflow: hidden;
      }
      .meter-bar {
        height: 100%;
        width: 0%;
        background: #4caf50;
        border-radius: 2px;
        transition: width 0.1s;
      }

      #log {
        background: #111;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 10px;
        font-family: monospace;
        height: 80px;
        overflow-y: auto;
        color: #7ec8a0;
      }
      .log-screen { color: #64b5f6; }
      .log-audio  { color: #7ec8a0; }
      .log-error  { color: #ef9a9a; }

      #recordings {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rec-card {
        background: #141414;
        border: 1px solid #2b2b2b;
        border-radius: 4px;
        padding: 6px;
      }
      .rec-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 6px;
      }
      .rec-actions {
        display: flex;
        gap: 6px;
      }
      .rec-btn {
        flex: unset;
        padding: 4px 6px;
        font-size: 11px;
        border-radius: 3px;
        background: #2d5f98;
        color: #fff;
      }
      .rec-meta {
        font-size: 10px;
        color: #9aa0a6;
      }
      .rec-empty {
        font-size: 10px;
        color: #777;
      }

      .section {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #2a2a2a;
      }
      .section h4 {
        margin: 0 0 6px;
        font-size: 12px;
        color: #cfcfcf;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 6px;
      }
      .field label {
        font-size: 10px;
        color: #9aa0a6;
      }
      .field input {
        background: #101010;
        border: 1px solid #2b2b2b;
        border-radius: 4px;
        padding: 6px 8px;
        color: #e0e0e0;
        font-size: 11px;
      }
      .inline {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #9aa0a6;
      }
      #transcript {
        background: #0f0f0f;
        border: 1px solid #222;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 10px;
        color: #e0e0e0;
        min-height: 60px;
        max-height: 140px;
        overflow-y: auto;
        font-family: monospace;
      }
      .transcript-line {
        margin-bottom: 4px;
      }
      .status {
        font-size: 10px;
        color: #7ec8a0;
      }
      .status.error {
        color: #ef9a9a;
      }
    </style>
  </head>
  <body>
    <h3>Screen &amp; Audio Logger</h3>

    <div id="preview-wrap">
      <video id="screen-preview" autoplay muted playsinline></video>
      <div id="preview-placeholder">No screen capture active</div>
    </div>

    <div class="meters">
      <div class="meter-box" id="meter-tab">
        <div class="meter-label">Tab audio</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-tab"></div></div>
      </div>
      <div class="meter-box" id="meter-mic">
        <div class="meter-label">Microphone</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-mic"></div></div>
      </div>
      <div class="meter-box" id="meter-sys">
        <div class="meter-label">System audio</div>
        <div class="meter-bar-track"><div class="meter-bar" id="bar-sys"></div></div>
      </div>
    </div>

    <div class="controls">
      <button id="start">&#9654; Start</button>
      <button id="stop" disabled>&#9632; Stop</button>
    </div>
    <button id="overlay-toggle">Show Transparent Overlay (POC)</button>
    <button id="popout">Open Detached Window</button>

    <div id="log"></div>
    <div id="recordings">
      <div class="rec-empty" id="recordings-empty">No recordings saved yet</div>
    </div>

    <div class="section" id="transcription">
      <h4>Ingest Endpoint (Audio + Face)</h4>
      <div class="field">
        <label for="transcribe-endpoint">Endpoint URL</label>
        <input id="transcribe-endpoint" type="text" placeholder="http://localhost:8000/ingest" />
      </div>
      <div class="field">
        <label for="transcribe-key">API Key (optional)</label>
        <input id="transcribe-key" type="password" placeholder="Bearer token or API key" />
      </div>
      <div class="inline">
        <input id="transcribe-enabled" type="checkbox" checked />
        <label for="transcribe-enabled">Enable live transcription</label>
      </div>
      <div class="status" id="transcribe-status">Idle</div>
      <div id="transcript"></div>
    </div>

    <div class="section" id="face-analysis">
      <h4>Face Analysis (Server)</h4>
      <div class="inline">
        <input id="face-enabled" type="checkbox" />
        <label for="face-enabled">Enable face analysis</label>
      </div>
      <div class="status" id="face-status">Idle</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
